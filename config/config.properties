# Idioma de la interfície (ca = català, en = anglès). Reinicia l'app per aplicar.
ui.language=ca

# Mode metal·ḷfon (true) o rang MIDI personalitzat (false).
isMetallophone=true

# Rang MIDI (only if isMetallophone=false): nota més baixa i més alta.
lowestMidi=36
highestMidi=84

# Mostra consells a la barra d'estat (true/false).
tipsVisible=false

# Mida de la finestra respecte la pantalla: amplada i alçada (0.0-1.0).
screenWidthRatio=0.95
screenHeightRatio=0.8

# Compassos visibles a la càmera.
nMeasuresCam=4

# Resolució rítmica: columnes per negra. Valors comuns: 12, 24.
nColsQuarter=12

# Amplada total de la partitura en columnes (capacitat màxima).
nColsScore=12000

# Autocorrecció en drag: impedeix notes solapades (true/false).
autoCorrect=true


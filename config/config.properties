# Interface language (ca = Catalan, en = English). Restart the app to apply.
ui.language=en

# Metallophone mode (true) or custom MIDI range (false).
isMetallophone=true

# MIDI range (only if isMetallophone=false): lowest and highest note.
lowestMidi=36
highestMidi=84

# Show tips in the status bar (true/false).
tipsVisible=true

# Window size relative to screen: width and height (0.0-1.0).
screenWidthRatio=0.95
screenHeightRatio=0.8

# Measures visible in the camera.
nMeasuresCam=4

# Rhythmic resolution: columns per quarter note. Common values: 12, 24.
nColsQuarter=12

# Total score width in columns (maximum capacity).
nColsScore=12000

# Autocorrect on drag: prevents note overlaps (true/false).
autoCorrect=true


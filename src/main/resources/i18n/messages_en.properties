help.lyrics.exit.desc=Exit lyrics edit mode

help.section.markers.title=Change markers
help.markers.intro=Markers are placed by clicking the corresponding button, entering the value in the dialog, then clicking on the grid. They appear in the chord strip as coloured boxes: blue (tempo), maroon (key), green (volume).

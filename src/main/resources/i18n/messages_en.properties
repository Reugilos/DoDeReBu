help.config.window.desc=Initial window size as a fraction of the screen (0.0-1.0). Example: screenWidthRatio=0.8  screenHeightRatio=0.8.
help.config.camera.desc=Number of measures visible at once in the score view.
help.config.resolution.desc=Rhythmic resolution: columns per quarter note. Common values: 12 (eighth-note precision), 24 (sixteenth-note).
help.config.capacity.desc=Total score width in columns (maximum capacity of the score).
help.config.autocorrect.desc=Autocorrect on drag: prevents accidental note overlaps when entering notes (true/false).

help.back.to.index=↑ Back to index

# Config comments
config.language.comment=Interface language (ca = Catalan, en = English). Restart the app to apply.
config.tipsVisible.comment=Show tips in the status bar (true/false).
config.screenSize.comment=Window size relative to screen: width and height (0.0-1.0).
config.nMeasuresCam.comment=Measures visible in the camera.
config.nColsQuarter.comment=Rhythmic resolution: columns per quarter note. Common values: 12, 24.
config.nColsScore.comment=Total score width in columns (maximum capacity).
config.autoCorrect.comment=Autocorrect on drag: prevents note overlaps (true/false).
config.isMetallophone.comment=Metallophone mode (true) or custom MIDI range (false).
config.midiRange.comment=MIDI range (only if isMetallophone=false): lowest and highest note.

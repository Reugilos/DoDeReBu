help.section.view.title=View
help.view.intro=Options for displaying the grid, the keyboard and the general interface.
help.view.penta.key=Penta / Templ button
help.view.penta.desc=Toggle between Pentagram view (grey rows mark the staff notes, the red row marks middle C) and Template view (highlights only the rows of the current template)

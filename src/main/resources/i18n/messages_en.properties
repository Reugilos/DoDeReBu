MyController.btn.help.title=Help
MyController.help.text=To enter a note, click and drag on the grid.\nUse Ctrl-Z to undo and Shift-Ctrl-Z to redo.\nCtrl-I: insert a column (click the target column). Ctrl-D: delete a column (click the column).\nTo select a single note, click on the gray area to the side of the corresponding keyboard key.\nTo select a pattern, use the Templ button and then click on the pattern''s root keyboard key.\nThen click the Selecting button again to turn off selection.\nUse the Penta button to show the strips of the selected notes.


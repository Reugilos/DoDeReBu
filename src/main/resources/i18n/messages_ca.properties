MyController.help.text=Per introduir una nota, fes clic i arrossega a la graella.\nUtilitza Ctrl-Z per desfer i Maj\u00fas-Ctrl-Z per refer.\nPer seleccionar una nota individual, fes clic a l''\u00e0rea grisa al costat de la tecla del teclat corresponent.\nPer seleccionar un patr\u00f3, utilitza el bot\u00f3 Templ i despr\u00e9s fes clic a la tecla arrel del patr\u00f3.\nFes clic al bot\u00f3 de selecci\u00f3 per desactivar-la.\nUtilitza el bot\u00f3 Penta per mostrar les franges de les notes seleccionades.

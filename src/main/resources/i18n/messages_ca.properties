MyController.btn.help.title=Ajuda
MyController.help.text=Per introduir una nota, fes clic i arrossega a la graella.\nUtilitza Ctrl-Z per desfer i Maj\u00fas-Ctrl-Z per refer.\nCtrl-I: insereix una columna (fes clic a la columna dest\u00ed). Ctrl-D: esborra una columna (fes clic a la columna).\nPer seleccionar una nota individual, fes clic a l''\u00e0rea grisa al costat de la tecla del teclat corresponent.\nPer seleccionar un patr\u00f3, utilitza el bot\u00f3 Templ i despr\u00e9s fes clic a la tecla arrel del patr\u00f3.\nFes clic al bot\u00f3 de selecci\u00f3 per desactivar-la.\nUtilitza el bot\u00f3 Penta per mostrar les franges de les notes seleccionades.

help.dialog.title=Ajuda

help.section.grid.title=Introduir i editar notes
help.grid.intro=Edita la graella de notes amb el ratolí. Clica per afegir notes, arrossega per estendre-les, i usa undo/redo per desfer canvis.
help.grid.enter.key=Clic + arrossegar
help.grid.enter.desc=Introdueix una nota (arrossega per allargar-la)
help.grid.delete.key=Maj\u00fas + arrossegar
help.grid.delete.desc=Esborra notes
help.grid.split.key=Doble clic
help.grid.split.desc=Divideix una nota en dues
help.grid.move.key=Ctrl + Maj\u00fas + arrossegar
help.grid.move.desc=Mou una nota
help.grid.undo.key=Ctrl-Z
help.grid.undo.desc=Desfer l'ultima acci\u00f3
help.grid.redo.key=Ctrl-Maj\u00fas-Z
help.grid.redo.desc=Refer l'ultima acci\u00f3 desfeta

help.section.selection.title=Selecci\u00f3 i porta-retalls
help.selection.intro=Selecciona un bloc de notes mantenint Ctrl premut i arrossegant. Un cop seleccionat, pots copiar, tallar, enganxar o replicar el bloc.
help.selection.select.key=Ctrl + arrossegar
help.selection.select.desc=Selecciona una regi\u00f3 rectangular de notes
help.selection.copy.key=Ctrl-C
help.selection.copy.desc=Copia la selecci\u00f3
help.selection.cut.key=Ctrl-X
help.selection.cut.desc=Retalla la selecci\u00f3
help.selection.paste.key=Ctrl-V
help.selection.paste.desc=Enganxa (despr\u00e9s fes clic per col\u00b7locar)
help.selection.replicate.key=Ctrl-R
help.selection.replicate.desc=Replica la selecci\u00f3 un pas endavant
help.selection.replicateEnd.key=Ctrl-Maj\u00fas-R
help.selection.replicateEnd.desc=Replica la selecci\u00f3 fins al final de la partitura

help.section.columns.title=Operacions de columnes
help.columns.intro=Insereix o elimina columnes de temps a la posició del playbar per ajustar el ritme de la partitura.
help.columns.insert.key=Ctrl-I
help.columns.insert.desc=Insereix una o m\u00e9s columnes (despr\u00e9s fes clic per col\u00b7locar)
help.columns.delete.key=Ctrl-D
help.columns.delete.desc=Esborra una o m\u00e9s columnes (despr\u00e9s fes clic per seleccionar)

help.section.pattern.title=Patr\u00f3 / Plantilla
help.pattern.intro=Els patrons generen un conjunt de notes actives al teclat, per facilitar la composici\u00f3 dins d'una escala, acord o interval concrets.
help.pattern.activate.key=Bot\u00f3 Patr\u00f3
help.pattern.activate.desc=Prem el bot\u00f3 Patr\u00f3 i despr\u00e9s fes clic a una tecla del teclat per definir la nota arrel
help.pattern.types.key=Escala / Acord / Interval / Llista
help.pattern.types.desc=Tria el tipus de patr\u00f3 al di\u00e0leg que apareix
help.pattern.extend.key=Una octava / Tot el teclat
help.pattern.extend.desc=Tria si el patr\u00f3 cobreix una octava o s'est\u00e9n a tot el rang del teclat
help.pattern.tonality.key=Ajustar a la tonalitat
help.pattern.tonality.desc=Aplica l'escala major o menor de la tonalitat actual, centrada al voltant del do del mig
help.pattern.manual.key=Tecles lliscants del teclat
help.pattern.manual.desc=Fes clic a les tecles lliscants per afegir o treure notes individuals del patr\u00f3

help.section.playback.title=Reproducci\u00f3 i navegaci\u00f3
help.playback.intro=Controls per reproduir la partitura, navegar per p\u00e0gines i ajustar el tempo i el volum de reproducci\u00f3 en viu.
help.playback.first.key=Bot\u00f3 ||&lt;
help.playback.first.desc=Salta al principi de la partitura
help.playback.prevnextpage.key=Botons &lt;&lt; / >>
help.playback.prevnextpage.desc=Salta a la p\u00e0gina anterior o seg\u00fcent
help.playback.prevnextcol.key=Botons &lt; / >
help.playback.prevnextcol.desc=Mou el playbar una columna enrere o endavant
help.playback.pagenum.key=Bot\u00f3 n\u00famero de p\u00e0gina
help.playback.pagenum.desc=Clica per saltar a un n\u00famero de comp\u00e0s concret
help.playback.play.key=Bot\u00f3 Play / Pausa
help.playback.play.desc=Inicia o pausa la reproducci\u00f3
help.playback.tempo.key=Bot\u00f3 Tempo
help.playback.tempo.desc=Fes clic per introduir un nou tempo en BPM
help.playback.volume.key=Vol+ / Vol-
help.playback.volume.desc=Augmenta o redueix el volum de reproducci\u00f3
help.playback.speed.key=Spd+ / Spd-
help.playback.speed.desc=Augmenta o redueix la velocitat de reproducci\u00f3 (no canvia el tempo desat)
help.playback.transpose.key=Trp+ / Trp-
help.playback.transpose.desc=Transposa tota la partitura un semit\u00f2 amunt o avall
help.playback.tremolo.key=Bot\u00f3 Tremolo
help.playback.tremolo.desc=Activa o desactiva l'efecte tremolo a la nota actual

help.section.mixer.title=Mesclador
help.mixer.intro=Gestiona les pistes d'\u00e0udio: canvia instruments, silencia o amaga tracks individuals i ajusta els volums.
help.mixer.open.key=Bot\u00f3 Mixer
help.mixer.open.desc=Obre o tanca el panell del mesclador
help.mixer.track.key=Mute / Hide
help.mixer.track.desc=Mute silencia un track durant la reproducci\u00f3; Hide l'amaga de la vista de la graella
help.mixer.instr.key=Bot\u00f3 Instr
help.mixer.instr.desc=Canvia l'instrument MIDI del track actual
help.mixer.drums.key=Bot\u00f3 Drums
help.mixer.drums.desc=Alterna entre mode mel\u00f2dic i mode percussi\u00f3 (canal 10)

help.section.chordslyrics.title=Acords i lletra
help.chordslyrics.intro=Afegeix acords a la franja superior i lletra a la franja inferior. Els acords es mostren com a s\u00edmbols a la franja superior i es pot canviar el seu format.
help.chords.add.key=Doble clic a la franja d'acords
help.chords.add.desc=Afegeix o edita un s\u00edmbol d'acord a la posici\u00f3 clicada
help.chords.format.key=Bot\u00f3 Format (franja d'acords)
help.chords.format.desc=Canvia el format dels s\u00edmbols d'acord (Dodeca, S\u00edmbol, Anglo, Solfeig...)
help.lyrics.edit.key=Doble clic a la franja de lletra
help.lyrics.edit.desc=Obre el mode d'edici\u00f3 de lletra a la nota clicada
help.lyrics.type.key=Escriu la s\u00edl\u00b7laba
help.lyrics.type.desc=Escriu una s\u00edl\u00b7laba o paraula; s'assigna a la nota actual
help.lyrics.advance.key=Espai / \u2013
help.lyrics.advance.desc=Passa a la nota seg\u00fcent (espai per separar paraules; \u2013 per separar s\u00edl\u00b7labes amb guionet)
help.lyrics.exit.key=Escape
help.lyrics.exit.desc=Surt del mode d'edici\u00f3 de lletra

help.section.markers.title=Marques de canvi
help.markers.intro=Les marques s'afegeixen clicant el bot\u00f3 corresponent, introduint el valor al di\u00e0leg i fent clic al grid per col\u00b7locar-les. Es visualitzen a la franja d'acords com a caixes de colors: blau (tempo), granate (tonalitat), verd (volum).
help.markers.timesig.key=Bot\u00f3 Comp\u00e0s
help.markers.timesig.desc=Afegeix una marca de canvi de comp\u00e0s a la posici\u00f3 triada
help.markers.key.key=Bot\u00f3 Tonalitat
help.markers.key.desc=Afegeix una marca de canvi de tonalitat a la posici\u00f3 triada
help.markers.tempo.key=Bot\u00f3 Tempo
help.markers.tempo.desc=Afegeix una marca de canvi de tempo (en BPM) a la posici\u00f3 triada
help.markers.volume.key=Bot\u00f3 Volum
help.markers.volume.desc=Afegeix una marca de canvi de volum (0\u2013127) per al track actual a la posici\u00f3 triada
help.markers.place.key=Col\u00b7locar la marca
help.markers.place.desc=Despr\u00e9s d'obrir el di\u00e0leg, fes clic a la columna dest\u00ed per col\u00b7locar la marca; o prem Enter per col\u00b7locar-la al principi de la p\u00e0gina actual

help.section.xylokeyboard.title=Teclat / Xil\u00b7l\u00f2fon
help.xylokeyboard.intro=El teclat visual permet tocar notes en directe i seleccionar-les despla\u00e7ant a la dreta, o retornar-les a lloc despla\u00e7ant a l'esquerra.
help.xylokeyboard.play.key=Clic a una tecla
help.xylokeyboard.play.desc=Sona la nota corresponent
help.xylokeyboard.slide.key=Clica la zona grisa
help.xylokeyboard.slide.desc=Fa lliscar la tecla
help.xylokeyboard.insert.key=Teclat dret (activat)
help.xylokeyboard.insert.desc=Les notes tocades s'insereixen a la partitura a la posici\u00f3 del playbar

help.section.score.title=Propietats de la partitura
help.score.intro=Metadades de la partitura: t\u00edtol, autor/a i descripci\u00f3. S'inclouen en desar i es recuperen en carregar.
help.score.title.key=Bot\u00f3 T\u00edtol
help.score.title.desc=Defineix o edita el t\u00edtol de la partitura
help.score.author.key=Bot\u00f3 Autor/a
help.score.author.desc=Defineix o edita l'autor/a de la partitura
help.score.description.key=Bot\u00f3 Descripci\u00f3
help.score.description.desc=Defineix o edita la descripci\u00f3 / notes de la partitura
help.score.timesig.key=Bot\u00f3 Comp\u00e0s
help.score.timesig.desc=Canvia el comp\u00e0s (clica i despr\u00e9s selecciona la columna dest\u00ed, o prem Enter per al playbar)

help.section.key.title=Tonalitat
help.key.intro=Navega per les tonalitats en el cercle de quintes o selecciona-les directament. Pots transposar tota la partitura al canviar de to.
help.key.nextprev.key=To >> / To &lt;&lt;
help.key.nextprev.desc=Avan\u00e7a o retrocedeix a la tonalitat seg\u00fcent o anterior (en el cercle de quintes)
help.key.reset.key=Bot\u00f3 To (central)
help.key.reset.desc=Obre el selector de tonalitat per saltar directament a qualsevol to; tamb\u00e9 permet transportar la partitura

help.section.view.title=Vista
help.view.intro=Opcions de visualitzaci\u00f3 de la graella, el teclat i la interf\u00edcie en general.
help.view.penta.key=Bot\u00f3 Penta / Plant
help.view.penta.desc=Alterna entre la vista Pentagrama (les files grises senyalen les notes del pentagrama, la fila vermella senyala el do del mig) i la vista Plantilla (il\u00b7lumina \u00fanicament les files de la plantilla actual)
help.view.keyboard.key=Bot\u00f3 Esq / Dreta
help.view.keyboard.desc=Canvia la posici\u00f3 del teclat en pantalla entre costat esquerre i costat dret
help.view.names.key=Bot\u00f3 Noms / Amaga
help.view.names.desc=Mostra o amaga els noms de notes a les tecles del teclat
help.view.mobiledo.key=Bot\u00f3 Absolut / M\u00f2bil
help.view.mobiledo.desc=Alterna entre noms de nota absoluts i noms i do m\u00f2bil (a la t\u00f2nica li diem sempre do)
help.view.tips.key=Bot\u00f3 Tips On / Tips Off
help.view.tips.desc=Mostra o amaga els tips a la barra d'estat
help.view.anacrusis.key=Bot\u00f3 Encabir
help.view.anacrusis.desc=Estreny les columnes per encabir el primer comp\u00e0s en anacrusa amb la resta de compassos de la primera p\u00e0gina. L'anacrusa es produeix quan la pe\u00e7a comen\u00e7a abans del primer comp\u00e0s.

help.section.exercises.title=Exercicis
help.exercises.intro=Navega pels exercicis d'entrenament auditiu del paquet actiu i reinicia'ls quan calgui.
help.exercises.nextprev.key=Botons Ex>> / Ex&lt;&lt;
help.exercises.nextprev.desc=Salta a l'exercici seg\u00fcent o anterior del paquet actual
help.exercises.restart.key=Bot\u00f3 Reiniciar
help.exercises.restart.desc=Reinicia l'exercici actual des del principi

help.section.export.title=Fitxers i Exportaci\u00f3
help.export.intro=Obre, desa i exporta la partitura. El format natiu \u00e9s .ddcgr.mid (compatible amb MIDI); tamb\u00e9 pots exportar com a SVG o PDF.
help.export.new.key=Bot\u00f3 Nova
help.export.new.desc=Crea una nova partitura buida (pregunta si vols desar si hi ha canvis sense desar)
help.export.load.key=Bot\u00f3 Obre
help.export.load.desc=Obre un fitxer de partitura (.ddcgr.mid)
help.export.svg.key=Bot\u00f3 SVG
help.export.svg.desc=Exporta la vista actual de la pantalla com a fitxer SVG
help.export.pdf.key=Bot\u00f3 PDF
help.export.pdf.desc=Imprimeix la partitura completa en un fitxer PDF
help.export.midi.key=Bot\u00f3 Desa
help.export.midi.desc=Desa la partitura com a fitxer MIDI (.ddcgr.mid o .mid)


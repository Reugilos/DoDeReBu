help.config.language.desc=Idioma de la interfície: ca (català) o en (anglès). Cal reiniciar per aplicar.
help.config.metallophone.desc=true = mode metal·lòfon (rang MIDI fix); false = usa lowestMidi / highestMidi per definir un rang personalitzat.
help.config.midirange.desc=Rang de notes MIDI mostrat al teclat (només si isMetallophone=false). Do del mig = 60.
help.config.tips.desc=Mostra consells a la barra d'estat (true/false).
help.config.window.desc=Mida inicial de la finestra com a fracció de la pantalla (0.0–1.0). Exemple: screenWidthRatio=0.8  screenHeightRatio=0.8.
help.config.camera.desc=Nombre de compassos visibles alhora a la vista de la partitura.
help.config.resolution.desc=Resolució rítmica: columnes per negra. Valors comuns: 12 (precisió de corxera), 24 (precisió de semicorxera).
help.config.capacity.desc=Amplada total de la partitura en columnes (capacitat màxima de la partitura).
help.config.autocorrect.desc=Autocorrecció en drag: evita solapaments accidentals de notes en introduir-les (true/false).

help.back.to.index=↑ Torna a l’índex

# Comentaris de config.properties
config.language.comment=Idioma de la interf\u00edcie (ca = catal\u00e0, en = angl\u00e8s). Reinicia l'app per aplicar.
config.tipsVisible.comment=Mostra consells a la barra d'estat (true/false).
config.screenSize.comment=Mida de la finestra respecte la pantalla: amplada i al\u00e7ada (0.0-1.0).
config.nMeasuresCam.comment=Compassos visibles a la c\u00e0mera.
config.nColsQuarter.comment=Resoluci\u00f3 r\u00edtmica: columnes per negra. Valors comuns: 12, 24.
config.nColsScore.comment=Amplada total de la partitura en columnes (capacitat m\u00e0xima).
config.autoCorrect.comment=Autocorrecci\u00f3 en drag: impedeix notes solapades (true/false).
config.isMetallophone.comment=Mode metal\u00b7l\u00f2fon (true) o rang MIDI personalitzat (false).
config.midiRange.comment=Rang MIDI (only if isMetallophone=false): nota m\u00e9s baixa i m\u00e9s alta.
